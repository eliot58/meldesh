<ion-header>
  <ion-toolbar>
    <ion-title>
      Профиль
    </ion-title>
  </ion-toolbar>
</ion-header>


<ion-content class="profile-page" [scrollY]="false">
  <div class="container">
    <div class="profile-block">
      <div class="avatar-wrapper">
        <div class="initials-avatar">A</div>
      </div>
      <h2 class="name">Aimedin</h2>
      <p class="email">chaimedin2003gmail.com</p>
    </div>

    <div class="list-menu">
      <ion-item button [routerLink]="['/edit-profile']">
        <span slot="start" class="icons material-icons-outlined">edit</span>
        <ion-label>Редактировать профиль</ion-label>
      </ion-item>

      <ion-item button [routerLink]="['/notification-settings']">
        <span slot="start" class="icons material-icons-outlined">notifications</span>
        <ion-label>Уведомления</ion-label>
      </ion-item>

      <ion-item button [routerLink]="['/events', 'favorites']">
        <span slot="start" class="icons material-icons-outlined">favorite_border</span>
        <ion-label>Избранные</ion-label>
      </ion-item>

      <ion-item button (click)="onLogout()">
        <span slot="start" class="icons material-icons-outlined">logout</span>
        <ion-label>Выйти</ion-label>
      </ion-item>
    </div>
  </div>
</ion-content>

<ion-footer>
  <ion-toolbar class="bottom-app-bar">
    <div class="bottom-nav">
      <ion-button fill="clear" [routerLink]="['/']">
        <span class="material-icons-outlined">school</span>
      </ion-button>
      <ion-button fill="clear" [routerLink]="['/events', 'course']">
        <span class="material-icons-outlined">menu_book</span>
      </ion-button>
      <ion-button fill="clear" disabled>
        <span class="material-icons active">person</span>
      </ion-button>
    </div>
  </ion-toolbar>
</ion-footer>
